<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BabyCare 登入</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="i18n.js"></script>
  <style>
    .login-card { max-width:420px; margin:80px auto; padding:24px; border-radius:16px; background:#fff; box-shadow:var(--shadow);} 
    .login-card h1{margin:0 0 12px}
    .form-row{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .form-input{padding:10px;border-radius:8px;border:1px solid #e6eefc}
    .primary{background:#4b83ff;color:#fff;padding:10px;border-radius:10px}
  </style>
</head>
<body>
  <main>
    <section class="login-card">
      <h1 data-i18n="login.title">BabyCare 登入</h1>
      <form id="loginForm">
        <div class="form-row">
          <label data-i18n="login.email">電子郵件</label>
          <input class="form-input" type="email" id="email" required data-i18n-placeholder="login.email" placeholder="" />
        </div>
        <div class="form-row">
          <label data-i18n="login.password">密碼</label>
          <input class="form-input" type="password" id="password" required data-i18n-placeholder="login.password" placeholder="" />
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="primary" type="submit" data-i18n="login.submit">BabyCareEmailPassword 登入</button>
          <select data-i18n-lang id="localeSelect" style="border-radius:8px;padding:8px;height:36px">
            <option value="zh-TW">中文（繁體）</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
          <a href="index.html">取消</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', { method: 'POST', headers: { 'content-type':'application/json' }, body: JSON.stringify({ email, password }) });
      const j = await res.json();
      if (j.ok) {
        alert('登入成功');
        window.location.href = 'index.html';
      } else {
        alert('登入失敗');
      }
    });

    // language selector
    const localeSelect = document.getElementById('localeSelect');
    if (localeSelect) {
      localeSelect.addEventListener('change', (e) => {
        I18N.setLocale(e.target.value);
      });
      localeSelect.value = I18N.getLocale();
    }
  </script>
</body>
</html>

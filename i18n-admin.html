<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>i18n Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <style>main{max-width:900px;margin:40px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:var(--shadow)}textarea{width:100%;height:360px;padding:12px;border-radius:8px;border:1px solid #e6eefc;font-family:monospace}</style>
</head>
<body>
  <main>
    <h1>翻譯管理 (i18n Admin)</h1>
    <p>選擇語系，編輯 JSON，按 <strong>儲存</strong>。</p>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <select id="localeSel">
        <option value="zh-TW">zh-TW</option>
        <option value="en">en</option>
        <option value="ja">ja</option>
        <option value="ko">ko</option>
      </select>
      <button id="loadBtn" style="padding:8px 12px;border-radius:8px;background:#4b83ff;color:#fff">載入</button>
      <button id="saveBtn" style="padding:8px 12px;border-radius:8px;background:#2f9e78;color:#fff">儲存</button>
      <span id="status" style="margin-left:8px;color:#334267"></span>
    </div>
    <textarea id="jsonArea">{}
</textarea>
    <div style="margin-top:12px"><a href="index.html">回首頁</a></div>
  </main>

  <script>
    const loadBtn = document.getElementById('loadBtn');
    const saveBtn = document.getElementById('saveBtn');
    const localeSel = document.getElementById('localeSel');
    const jsonArea = document.getElementById('jsonArea');
    const status = document.getElementById('status');

    async function loadLocale() {
      const loc = localeSel.value;
      status.textContent = '載入中...';
      try {
        const res = await fetch(`/api/locales/${loc}`);
        const j = await res.json();
        if (j.ok) {
          jsonArea.value = JSON.stringify(j.data, null, 2);
          status.textContent = '已載入';
        } else {
          status.textContent = '載入失敗';
        }
      } catch (e) { status.textContent = '錯誤'; }
    }

    async function saveLocale() {
      const loc = localeSel.value;
      try {
        const body = JSON.parse(jsonArea.value);
        status.textContent = '儲存中...';
        const res = await fetch(`/api/locales/${loc}`, { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(body) });
        const j = await res.json();
        if (j.ok) { status.textContent = '已儲存'; }
        else { status.textContent = '儲存失敗'; }
      } catch (e) { status.textContent = 'JSON 解析錯誤'; }
    }

    loadBtn.addEventListener('click', loadLocale);
    saveBtn.addEventListener('click', saveLocale);
  </script>
</body>
</html>
